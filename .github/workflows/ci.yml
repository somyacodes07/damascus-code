name: Damascus CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ============================================================
  # Backend — Lint + Unit Tests
  # ============================================================
  backend-lint:
    name: Backend Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-root

      - name: Run ruff lint
        run: poetry run ruff check .

      - name: Run ruff format check
        run: poetry run ruff format --check .

  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run unit tests
        run: poetry run pytest tests/unit/ -v --tb=short
        env:
          DAMASCUS_ENV: testing
          DAMASCUS_DEBUG: "false"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/htmlcov/
          if-no-files-found: ignore

  # ============================================================
  # CLI — Lint
  # ============================================================
  cli-lint:
    name: CLI Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run ruff lint
        run: poetry run ruff check .

  # ============================================================
  # Integration Tests (requires infrastructure)
  # Only runs on push to main/master (not on PR)
  # ============================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: damascus
          POSTGRES_PASSWORD: damascus_dev
          POSTGRES_DB: damascus
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Apply migrations
        run: poetry run alembic upgrade head
        env:
          DAMASCUS_ENV: testing
          DATABASE_URL: postgresql+asyncpg://damascus:damascus_dev@localhost:5432/damascus

      - name: Start backend in background
        run: |
          poetry run uvicorn damascus.main:app --port 8000 &
          sleep 3
        env:
          DAMASCUS_ENV: testing
          DATABASE_URL: postgresql+asyncpg://damascus:damascus_dev@localhost:5432/damascus
          REDIS_URL: redis://localhost:6379

      - name: Run integration tests
        run: poetry run pytest tests/integration/ -v --tb=short
        env:
          DAMASCUS_ENV: testing
